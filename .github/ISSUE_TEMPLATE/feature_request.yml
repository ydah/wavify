name: Feature request
description: Suggest a focused Wavify improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What audio workflow is blocked or awkward today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest API or behavior change that would solve it.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Core audio API
        - Codec I/O
        - Streaming
        - DSP
        - Sequencer DSL
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: Tradeoffs
      description: Note compatibility, dependency, performance, or scope concerns.
