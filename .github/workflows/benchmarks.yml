name: Benchmarks

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      WAV_IO_ITERATIONS: "2"
      WAV_IO_DURATION: "0.05"
      DSP_BENCH_ITERATIONS: "2"
      DSP_BENCH_DURATION: "0.05"
      FLAC_BENCH_ITERATIONS: "2"
      FLAC_BENCH_DURATION: "0.05"
      STREAM_BENCH_DURATION: "0.05"
      BENCH_RUNS: "3"
      BENCH_DIR: "tmp/benchmarks/ci"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@a30dfa457ad68707b8b910ac3a244714b61c0626 # v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Run benchmark smoke reports
        run: bundle exec rake bench:baseline
