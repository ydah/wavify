name: Ruby
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  test-native:
    runs-on: ubuntu-latest
    name: Native OGG Ruby ${{ matrix.ruby }}
    strategy:
      matrix:
        ruby:
          - "3.1"
          - "3.2"
          - "3.3"
          - "3.4"
          - "4.0"
          - "head"
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install native audio dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes libogg-dev libvorbis-dev
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run specs
        run: bundle exec rspec
      - name: Run coverage gate
        if: matrix.ruby == '3.4'
        run: bundle exec rake spec:coverage COVERAGE_MINIMUM=90
      - name: Run example smoke tests
        if: matrix.ruby == '3.4'
        run: bundle exec rake docs:examples
      - name: Run docs check
        if: matrix.ruby == '3.4'
        run: YARD_MINIMUM=85 bundle exec rake docs:check
      - name: Validate RBS signatures
        if: matrix.ruby == '3.4'
        run: bundle exec rake types:validate
      - name: Run release check
        if: matrix.ruby == '3.4'
        run: bundle exec rake release:check
      - name: Run lint
        if: matrix.ruby == '3.4'
        run: bundle exec rake lint

  test-core:
    runs-on: ${{ matrix.os }}
    name: Core without OGG (${{ matrix.os }})
    env:
      BUNDLE_WITHOUT: ogg
      WAVIFY_SKIP_OGG: "1"
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Run core specs
        run: bundle exec rspec
