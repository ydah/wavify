name: Ruby

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-native:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    name: Native OGG Ruby ${{ matrix.ruby }}
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - "3.1"
          - "3.2"
          - "3.3"
          - "3.4"
          - "4.0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install native audio dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes libogg-dev libvorbis-dev
      - name: Set up Ruby
        uses: ruby/setup-ruby@a30dfa457ad68707b8b910ac3a244714b61c0626 # v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run specs
        run: bundle exec rspec
      - name: Run coverage gates
        if: matrix.ruby == '3.4'
        env:
          SIMPLECOV_BRANCH: "1"
          COVERAGE_MINIMUM: "90"
          COVERAGE_BRANCH_MINIMUM: "70"
          COVERAGE_MINIMUM_PER_FILE: "60"
          COVERAGE_BRANCH_MINIMUM_PER_FILE: "40"
        run: bundle exec rake spec:coverage
      - name: Run project checks
        if: matrix.ruby == '3.4'
        run: bundle exec rake check
      - name: Run release check
        if: matrix.ruby == '3.4'
        run: bundle exec rake release:check

  test-core:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    name: Core without OGG (${{ matrix.os }})
    env:
      BUNDLE_WITHOUT: ogg
      WAVIFY_SKIP_OGG: "1"
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-14
          - windows-2022
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@a30dfa457ad68707b8b910ac3a244714b61c0626 # v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Run core specs
        run: bundle exec rspec

  dependency-bounds:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    name: Dependencies (${{ matrix.bounds }})
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/${{ matrix.bounds }}.gemfile
      BUNDLE_WITHOUT: ogg
      WAVIFY_SKIP_OGG: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - bounds: minimum
            ruby: "3.1"
          - bounds: latest
            ruby: "3.4"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@a30dfa457ad68707b8b910ac3a244714b61c0626 # v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run specs
        run: bundle exec rspec

  canary:
    if: github.event_name == 'schedule'
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Ruby head / latest runner canary
    env:
      BUNDLE_WITHOUT: ogg
      WAVIFY_SKIP_OGG: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up Ruby head
        uses: ruby/setup-ruby@a30dfa457ad68707b8b910ac3a244714b61c0626 # v1
        with:
          ruby-version: head
          bundler-cache: true
      - name: Run specs
        run: bundle exec rspec
